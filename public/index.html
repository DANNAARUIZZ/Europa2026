          <div class="activity-meta"><span class="tag tag-food">Comida</span> ~£10-15/persona · 1 hora</div>
          <div class="activity-meta" style="margin-top:4px;">Último lunes en Londres — sin prisa. Buscar un café con buena pinta cerca del hotel. Cualquier café del barrio funciona — Londres tiene excelentes opciones en cada esquina. Pedir huevos, tostadas y café.</div>          <div class="activity-name">11:00AM — Westminster Abbey</div>
          <div class="activity-meta"><span class="tag tag-ticket">Boleto</span> ~£30/adulto · 1.5 horas</div>

          <div class="activity-meta" style="margin-top:4px;">Saliendo de Westminster Abbey buscar un pub o restaurante alejado de los monumentos — al menos 5 minutos caminando para evitar precios turísticos. Victoria Street y Tufton Street tienen buenas opciones locales.</div>          <div class="activity-name">2:30PM — Mercado de Camden</div>

          <div class="activity-meta"><span class="tag tag-free">Gratis</span> 1 hora</div>
          <div class="activity-meta" style="margin-top:4px;">A 15 minutos caminando norte desde Camden. Una colina verde con la mejor vista panorámica gratuita de Londres — The Shard, el London Eye, el Gherkin, Canary Wharf, todo a la vez. En junio con el sol de la tarde es una de las mejores fotos de Londres. Parque residencial donde van los londinenses — mucho menos turístico que Hyde Park. Sentarse en el pasto en la cima con algo de tomar y disfrutar la vista.</div>          <div class="activity-name">7:00PM — Cena — última noche en Londres</div>
          <div class="activity-meta"><span class="tag tag-food">Comida</span> 2 horas</div>
          <div class="activity-meta" style="margin-top:4px;">Regresar al centro para la última cena en Londres. Elegir el mejor steakhouse de la lista: Hawksmoor Seven Dials — el mejor steak de Londres, última noche merece el gusto, reservar con anticipación. Flat Iron — excelente calidad, más accesible, sin reservación. Gaucho — steakhouse argentino, buen ambiente para una última noche.</div>          <div class="activity-name">12:01PM — Eurostar Londres → París</div>
          <div class="activity-meta"><span class="tag tag-tip">Transporte</span> <span class="tag tag-ticket">Boleto</span> 2h29m · $160/adulto</div>
          <div class="activity-meta" style="margin-top:4px;">Salir del hotel con tiempo para llegar a London St Pancras con al menos 45 min de anticipación — hay control de pasaportes y aduana como en un aeropuerto. Al cruzar el túnel bajo el Canal de la Mancha (El Chunnel) — 50 km bajo el mar — el paisaje pasa de Inglaterra a Francia en minutos. Llegada a Paris Gare du Nord a las 15:30PM hora local.</div>          <div class="activity-name">3:30PM — Llegada Gare du Nord + traslado al hotel</div>
          <div class="activity-meta"><span class="tag tag-tip">Transporte</span> 45 min</div>

          <div class="activity-meta"><span class="tag tag-free">Gratis</span> 1.5 horas</div>
          <div class="activity-meta" style="margin-top:4px;">Ir al parque Champ de Mars — primera vez que ven la Torre Eiffel en persona. Sentarse en el pasto, tomar fotos, absorber el momento. La Torre mide 330 metros y desde el parque la perspectiva es impresionante. Después cruzar el Sena por el Pont d'Iéna — 10 min — hasta el Trocadéro. La vista frontal más icónica de París — la Torre perfectamente enmarcada con las fuentes en primer plano y el Palais de Chaillot de fondo. El punto más fotogénico de París.</div>          <div class="activity-name">7:30PM — Crucero nocturno por el Sena</div>
